<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Eco Controll - Download</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #1B2E35;
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      text-align: center;

      padding: 40px 20px;
    }

    .container {
      background-color: #2A4654;
      padding: 40px 30px;
      border-radius: 20px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }

    .logo {
      width: 110px;
      height: 110px;
      border-radius: 20px;
      margin-bottom: 20px;
      object-fit: contain;
    }

    h1 {
      margin: 0 0 16px 0;
      color: #4CAF50;
      font-size: 32px;
      font-weight: bold;
    }

    p {
      color: #f1f1f1;
      font-size: 16px;
      line-height: 1.5;
      margin: 0 0 30px 0;
    }

    .btn-download {
      display: inline-block;
      background-color: #4CAF50;
      color: white;
      padding: 15px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: 0.3s ease;
      margin-bottom: 28px;
    }

    .btn-download:hover {
      background-color: #43A047;
      transform: scale(1.03);
    }

    .aviso {
      margin: 0;
      font-size: 13px;
      color: #e0e0e0;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        padding: 32px 18px;
      }

      .container {
        margin-top: 20px;
        margin-bottom: 20px;
        padding: 32px 22px;
        border-radius: 18px;
      }

      .logo {
        width: 95px;
        height: 95px;
        margin-bottom: 18px;
      }

      h1 {
        font-size: 28px;
        margin-bottom: 14px;
      }

      p {
        font-size: 15px;
        margin-bottom: 28px;
      }

      .btn-download {
        width: 100%;
        padding: 15px 20px;
        font-size: 17px;
        margin-bottom: 26px;
      }

      .aviso {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="logo.png" alt="Logo Eco Controll" class="logo">

    <h1>Eco Controll</h1>

    <p>
      Aplicativo de gestão sustentável para monitoramento de cisternas
      e geração de energia solar.
    </p>

    <a 
      class="btn-download"
      href="https://github.com/ECO-CONTROLL/Teste_Download/releases/latest/download/eco-controll.apk">
      Baixar aplicativo
    </a>

    <p class="aviso">
      Disponível para Android. Pode ser necessário permitir instalação de
      aplicativos de fontes externas.
    </p>
  </div>

</body>
</html>
